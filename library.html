<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Media Library — Beslyfe</title>
  <meta name="description" content="Your personal photo and video library for posts, reels and stories.">
  <link rel="stylesheet" href="/profiles.css">
  <link rel="stylesheet" href="/social.css">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Media Library — Beslyfe">
  <meta property="og:description" content="Your personal photo and video library for Beslyfe posts, reels and stories.">
  <meta property="og:url" content="https://beslyfe.com/library">
  <meta property="og:image" content="https://beslyfe.com/assets/images/beslyfe-social-preview-v2.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Media Library — Beslyfe">
  <meta name="twitter:description" content="Your personal photo and video library for Beslyfe posts, reels and stories.">
  <meta name="twitter:image" content="https://beslyfe.com/assets/images/beslyfe-social-preview-v2.png">
  <link rel="canonical" href="https://beslyfe.com/library">
  <link rel="stylesheet" href="/assets/css/beslyfe-community.css">
</head>
<body data-cms-page="library">
  <header class="site-header"><nav><a class="site-logo" href="/">beslyfe<span class="brand-dot">.</span></a><ul class="nav-links"><li><a href="/community">Community</a></li><li><a href="/feed">Feed</a></li><li><a href="/directory">People</a></li><li><a href="/create">Build</a></li></ul></nav></header>

  <div id="soNav"></div>

  <div class="so-page">
    <h1>Your Media Library</h1>
    <p class="lead">Every photo and video you upload lives here, ready to reuse in posts, reels and stories.</p>

    <div class="so-identity" id="identityBar" style="margin-bottom:18px">
      <div class="so-avatar placeholder" id="idAvatar">?</div>
      <div class="so-id-text" id="idText"><strong>Choose your profile</strong><span>to see and manage your library</span></div>
      <button class="so-btn" id="idChangeBtn" type="button">Choose profile</button>
    </div>

    <div style="margin-bottom:18px">
      <input type="file" id="uploadInput" accept="image/*,video/*" hidden>
      <button class="so-btn" id="uploadBtn" type="button">⬆ Upload photo or video</button>
      <span class="so-error" id="uploadError" hidden></span>
    </div>

    <div class="lib-grid" id="grid"></div>
  </div>

  <footer class="site-footer">
    <p><strong style="color:#fff">Beslyfe</strong> Community · Free to join</p>
  </footer>

  <script src="/beslyfe-session.js"></script>
  <script src="/beslyfe-social.js"></script>
  <script src="/assets/js/traffic.js" defer></script>
  <script src="/library.js"></script>
  <script src="/beslyfe-notifications.js"></script>
</body>
</html>
