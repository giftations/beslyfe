
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In or Join Free | Beslyfe</title>
<link rel="stylesheet" href="/auth.css">
<script>
  /* Already signed in? Skip the login form and go straight to the right
     dashboard. Sessions persist until logout, so returning to this page (e.g.
     via the browser back button) should never force a fresh sign-in. */
  (function () {
    try {
      var earlierKey = ['ba', 'kd_session'].join('');
      var raw = localStorage.getItem('beslyfe_session') || localStorage.getItem(earlierKey);
      if (raw && !localStorage.getItem('beslyfe_session')) localStorage.setItem('beslyfe_session', raw);
      localStorage.removeItem(earlierKey);
      var s = JSON.parse(raw || 'null');
      if (s && s.id) {
        var requested = new URLSearchParams(window.location.search).get('next') || '';
        var safe = '';
        if (requested.charAt(0) === '/' && requested.indexOf('//') !== 0 && requested.indexOf('\\') === -1) {
          try {
            var parsed = new URL(requested, window.location.origin);
            if (parsed.origin === window.location.origin && !/^\/(?:login|sign-in|signup|join)(?:\/|$)/.test(parsed.pathname)) safe = parsed.pathname + parsed.search + parsed.hash;
          } catch (e) {}
        }
        window.location.replace(s.role === 'admin' ? '/admin/' : (safe || '/hub'));
      }
    } catch (e) {}
  })();
</script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/favicon.svg">
  <meta name="robots" content="noindex, nofollow">
</head>
<body>

<div class="login-box">
<a class="auth-brand" href="/">beslyfe<span>.</span></a>
<h1>Welcome to Beslyfe</h1>
<p class="login-help">Sign in to your community or create a free account. Members are 100% free—no credit card or subscription.</p>
<p id="setupNotice" class="setup-notice" role="status" aria-live="polite" hidden></p>

<div class="tab-bar">
  <button class="tab-btn active" id="signinTab">Sign In</button>
  <button class="tab-btn" id="createTab">Join Free</button>
</div>

<!-- Sign In Form -->
<form id="signinForm" class="tab-panel">
  <label for="signinEmail">Email or Username</label>
  <input type="text" id="signinEmail" placeholder="your@email.com or username" required autocomplete="username" autocapitalize="none" spellcheck="false">
  <label for="signinPassword">Password</label>
  <input type="password" id="signinPassword" placeholder="Password" required autocomplete="current-password">
  <p id="signinError" class="error-message" role="alert" aria-live="polite"></p>
  <button type="submit">Sign In</button>
  <p style="margin-top:12px;text-align:center"><a href="/forgot-password.html">Forgot your password?</a> &middot; <a href="/verify-email.html">Resend verification email</a></p>
</form>

<!-- Create Account Form -->
<form id="createForm" class="tab-panel hidden">
  <label for="createName">Full Name</label>
  <input type="text" id="createName" placeholder="Your full name" required autocomplete="name">
  <label for="createEmail">Email</label>
  <input type="email" id="createEmail" placeholder="your@email.com" required autocomplete="email">
  <label for="createUsername">Username <span style="font-weight:normal;opacity:.7">(optional)</span></label>
  <input type="text" id="createUsername" placeholder="Choose a username to sign in with" autocomplete="username" autocapitalize="none" spellcheck="false">
  <label for="createPassword">Password</label>
  <input type="password" id="createPassword" placeholder="Create a password (min 8 chars)" required autocomplete="new-password">
  <label for="createRole">I am a...</label>
  <select id="createRole" required>
    <option value="" selected disabled>Select your role</option>
    <option value="attendee">Community member</option>
    <option value="vendor">Business or organization</option>
    <option value="speaker">Mentor, educator, or creator</option>
    <option value="sponsor">Partner or supporter</option>
    <option value="dj">Performer or artist</option>
  </select>
  <p id="createError" class="error-message" role="alert" aria-live="polite"></p>
  <p id="createSuccess" class="success-message" role="status" aria-live="polite"></p>
  <button type="submit">Join Beslyfe Free</button>
</form>

<div class="login-footer"><a href="/">Back to Beslyfe</a><span aria-hidden="true">·</span><a href="/admin">Admin</a></div>
</div>

<script src="/auth.js"></script>
<script src="/assets/js/traffic.js"></script>
</body>
</html>
