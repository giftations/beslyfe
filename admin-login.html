
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In | Bak'd On The Bay</title>
<link rel="stylesheet" href="auth.css">
<script>
  /* Already signed in? Skip the login form and go straight to the right
     dashboard. Sessions persist until logout, so returning to this page (e.g.
     via the browser back button) should never force a fresh sign-in. */
  (function () {
    try {
      var s = JSON.parse(localStorage.getItem('bakd_session') || 'null');
      if (s && s.id) window.location.replace(s.role === 'admin' ? '/admin/' : '/hub');
    } catch (e) {}
  })();
</script>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/favicon.svg">
  <meta name="robots" content="noindex, nofollow">
</head>
<body>

<div class="login-box">
<h1>Bak'd On The Bay</h1>

<div class="tab-bar">
  <button class="tab-btn active" id="signinTab">Sign In</button>
  <button class="tab-btn" id="createTab">Create Account</button>
</div>

<!-- Sign In Form -->
<form id="signinForm" class="tab-panel">
  <label for="signinEmail">Email or Username</label>
  <input type="text" id="signinEmail" placeholder="your@email.com or username" required autocomplete="username" autocapitalize="none" spellcheck="false">
  <label for="signinPassword">Password</label>
  <input type="password" id="signinPassword" placeholder="Password" required autocomplete="current-password">
  <p id="signinError" class="error-message" role="alert" aria-live="polite"></p>
  <button type="submit">Sign In</button>
  <p style="margin-top:12px;text-align:center"><a href="/forgot-password.html">Forgot your password?</a></p>
</form>

<!-- Create Account Form -->
<form id="createForm" class="tab-panel hidden">
  <label for="createName">Full Name</label>
  <input type="text" id="createName" placeholder="Your full name" required autocomplete="name">
  <label for="createEmail">Email</label>
  <input type="email" id="createEmail" placeholder="your@email.com" required autocomplete="email">
  <label for="createUsername">Username <span style="font-weight:normal;opacity:.7">(optional)</span></label>
  <input type="text" id="createUsername" placeholder="Choose a username to sign in with" autocomplete="username" autocapitalize="none" spellcheck="false">
  <label for="createPassword">Password</label>
  <input type="password" id="createPassword" placeholder="Create a password (min 8 chars)" required autocomplete="new-password">
  <label for="createRole">I am a...</label>
  <select id="createRole" required>
    <option value="" selected disabled>Select your role</option>
    <option value="attendee">General Attendee</option>
    <option value="vendor">Vendor</option>
    <option value="speaker">Speaker</option>
    <option value="sponsor">Sponsor</option>
    <option value="dj">DJ / Performer</option>
  </select>
  <p id="createError" class="error-message" role="alert" aria-live="polite"></p>
  <p id="createSuccess" class="success-message" role="status" aria-live="polite"></p>
  <button type="submit">Create Account</button>
</form>

</div>

<script src="auth.js"></script>
</body>
</html>
