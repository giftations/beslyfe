<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Community Map — Beslyfe</title>
  <meta name="description" content="Share your location publicly or privately and see where the community is.">
  <link rel="stylesheet" href="/profiles.css">
  <link rel="stylesheet" href="/social.css">
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/favicon.svg">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Community Map — Beslyfe">
  <meta property="og:description" content="Share your location publicly or privately and see where the Beslyfe community is.">
  <meta property="og:url" content="https://beslyfe.com/map">
  <meta property="og:image" content="https://beslyfe.com/assets/images/beslyfe-social-preview-v2.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Community Map — Beslyfe">
  <meta name="twitter:description" content="Share your location publicly or privately and see where the Beslyfe community is.">
  <meta name="twitter:image" content="https://beslyfe.com/assets/images/beslyfe-social-preview-v2.png">
  <link rel="canonical" href="https://beslyfe.com/map">
  <link rel="stylesheet" href="/assets/css/beslyfe-community.css">
</head>
<body data-cms-page="map">
  <header class="site-header"><nav><a class="site-logo" href="/">beslyfe<span class="brand-dot">.</span></a><ul class="nav-links"><li><a href="/community">Community</a></li><li><a href="/feed">Feed</a></li><li><a href="/directory">People</a></li><li><a href="/create">Build</a></li></ul></nav></header>

  <div id="soNav"></div>

  <div class="so-page">
    <h1>Community Map</h1>
    <p class="lead">Share where you are — publicly, with followers only, or keep a private pin just for you.</p>

    <div class="so-identity" id="identityBar" style="margin-bottom:18px">
      <div class="so-avatar placeholder" id="idAvatar">?</div>
      <div class="so-id-text" id="idText"><strong>Choose your profile</strong><span>to share your location</span></div>
      <button class="so-btn" id="idChangeBtn" type="button">Choose profile</button>
    </div>

    <div class="studio-loc" style="margin-bottom:8px">
      <button class="so-btn" id="shareBtn" type="button">📍 Share my location</button>
      <input type="text" id="locLabel" placeholder="Name this place (optional)" maxlength="120">
      <select id="locVis"><option value="public">Public</option><option value="followers">Followers</option><option value="private">Private (only me)</option></select>
      <button class="so-btn ghost" id="stopBtn" type="button" hidden>Stop sharing</button>
    </div>
    <div class="so-error" id="mapError" hidden></div>

    <h2 style="color:#fff;margin:24px 0 14px">Shared places</h2>
    <div class="map-grid" id="mapGrid"><p class="so-muted">Loading the map…</p></div>
  </div>

  <footer class="site-footer">
    <p><strong style="color:#fff">Beslyfe</strong> Community · Free to join</p>
  </footer>

  <script src="/beslyfe-session.js"></script>
  <script src="/beslyfe-social.js"></script>
  <script src="/assets/js/traffic.js" defer></script>
  <script src="/map.js"></script>
  <script src="/beslyfe-notifications.js"></script>
</body>
</html>
