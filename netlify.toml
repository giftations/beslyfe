[build]
  # This is a static HTML site (served directly from the repo root) backed by
  # Netlify Functions and Netlify Database. There is no asset/compile step, so
  # the build is a no-op. Defining the command here takes precedence over any
  # UI-configured command (e.g. a leftover `bundle exec jekyll build`, which
  # fails because the site is not a Ruby/Jekyll project and has no Gemfile).
  # Note: _config.yml is only used for GitHub Pages, not for the Netlify deploy.
  command = "echo 'Static site — no build step required.'"
  publish = "."

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[headers]]
  for = "/*"
  [headers.values]
    # SAMEORIGIN (not DENY) so the Admin OS shell can embed the same-origin
    # editor pages (Website CMS, Floor Plan, Schedule) in iframes. Cross-origin
    # framing — the actual clickjacking threat — is still blocked.
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Content-Security-Policy = "default-src 'self'; img-src 'self' data: blob: https:; media-src 'self' data: blob: https:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https:; frame-src 'self' https://www.openstreetmap.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
