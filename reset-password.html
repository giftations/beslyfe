<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset Password | Beslyfe</title>
<meta name="description" content="Choose a new password for your Beslyfe account.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="stylesheet" href="password-reset.css">
</head>
<body>
<main class="reset-box">
<h1>Create New Password</h1>
<form id="newPasswordForm">
<label for="newPassword">New password</label>
<input id="newPassword" name="new-password" type="password" autocomplete="new-password" placeholder="At least 8 characters" required>
<label for="confirmPassword">Confirm password</label>
<input id="confirmPassword" name="confirm-password" type="password" autocomplete="new-password" placeholder="Re-enter your new password" required>
<button type="submit">Update Password</button>
</form>
<div id="resetMessage" role="status" aria-live="polite"></div>
<p><a href="/login">Back to sign in</a></p>
</main>
<script src="password-reset.js"></script>
<script src="/assets/js/traffic.js"></script>
</body>
</html>
