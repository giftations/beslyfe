<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — Bak'd On The Bay</title>
<meta name="description" content="Reset your Bak'd On The Bay account password.">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="stylesheet" href="password-reset.css">
</head>
<body>
<main class="reset-box">
<h1>Forgot Password</h1>
<p>Enter the email on your account and we'll send you a link to choose a new password.</p>
<form id="resetRequestForm">
<label for="resetEmail">Email address</label>
<input id="resetEmail" name="email" type="email" autocomplete="email" placeholder="you@example.com" required>
<button type="submit">Send Reset Link</button>
</form>
<div id="message" role="status" aria-live="polite"></div>
<p><a href="/admin-login.html">Back to sign in</a></p>
</main>
<script src="password-reset.js"></script>
</body>
</html>
