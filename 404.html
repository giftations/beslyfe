<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page not found | Bak'd On The Bay</title>
<link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
<link rel="apple-touch-icon" href="/assets/favicon.svg">
<style>
  :root{ --accent:#9FE22D; }
  *{ box-sizing:border-box; }
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;
    background:#081008;
    color:#f2f5ec;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 20px;
  }
  .container{ max-width:560px; }
  .code{
    font-size:5rem;
    line-height:1;
    font-weight:800;
    color:var(--accent);
    letter-spacing:-2px;
  }
  h1{
    font-size:1.6rem;
    margin:0.4rem 0 1rem;
  }
  p{
    color:#b9c4a9;
    line-height:1.6;
    margin:0 0 2rem;
  }
  .actions{
    display:flex;
    gap:14px;
    justify-content:center;
    flex-wrap:wrap;
  }
  .btn{
    display:inline-block;
    padding:12px 26px;
    border-radius:30px;
    text-decoration:none;
    font-weight:700;
  }
  .btn.primary{ background:var(--accent); color:#000; }
  .btn.ghost{
    border:1px solid rgba(159,226,45,0.4);
    color:var(--accent);
  }
</style>
</head>
<body>
  <div class="container">
    <div class="code" aria-hidden="true">404</div>
    <h1>404 — Page not found</h1>
    <p>The page you're looking for doesn't exist or has moved. Let's get you back on track.</p>
    <div class="actions">
      <a class="btn primary" href="/">Home</a>
      <a class="btn ghost" href="/directory">Directory</a>
    </div>
  </div>
  <script src="/assets/js/traffic.js"></script>
</body>
</html>
