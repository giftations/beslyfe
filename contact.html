<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Bak'd On The Bay</title>
  <link rel="icon" type="image/svg+xml" href="/assets/favicon.svg">
  <link rel="apple-touch-icon" href="/assets/favicon.svg">
  <meta name="description" content="Get in touch with the Bak'd On The Bay team about tickets, vendors, sponsorships and general questions.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Contact — Bak'd On The Bay">
  <meta property="og:description" content="Get in touch with the Bak'd On The Bay team about tickets, vendors, sponsorships and general questions.">
  <meta property="og:url" content="https://bakdonthebay.netlify.app/contact">
  <meta property="og:image" content="https://bakdonthebay.netlify.app/assets/images/bayfront-crowd-hero.jpg">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Contact — Bak'd On The Bay">
  <meta name="twitter:description" content="Get in touch with the Bak'd On The Bay team about tickets, vendors, sponsorships and general questions.">
  <meta name="twitter:image" content="https://bakdonthebay.netlify.app/assets/images/bayfront-crowd-hero.jpg">
  <link rel="canonical" href="https://bakdonthebay.netlify.app/contact">
  <style>
    .skip-link{position:absolute;left:-9999px;top:0;background:#fff;color:#000;padding:8px;z-index:1000}
    .skip-link:focus{left:8px}
  </style>
</head>
<body data-cms-page="contact">
  <a class="skip-link" href="#main">Skip to content</a>
  <main id="main">
  <h1 data-cms="contact.title">Contact Us</h1>
  <p data-cms="contact.intro">Have a question? Send us a message and the team will get back to you.</p>
  <!-- Submits to the applications database function (type "other") so messages
       stay on the site and appear in the admin dashboard — not Netlify Forms. -->
  <form id="contactForm" novalidate>
    <label for="contactName">Name</label><br>
    <input id="contactName" name="name" placeholder="Name" required><br>
    <label for="contactEmail">Email</label><br>
    <input id="contactEmail" type="email" name="email" placeholder="Email" required><br>
    <label for="contactMessage">Message</label><br>
    <textarea id="contactMessage" name="message" placeholder="Message" required></textarea><br>
    <button type="submit" id="submitBtn">Send</button>
  </form>
  <p id="successMsg" hidden>Thanks — your message has been received.</p>
  <p id="errorMsg" hidden>Something went wrong. Please try again.</p>
  </main>
  <script>
    document.getElementById('contactForm').addEventListener('submit', function (e) {
      e.preventDefault();
      var btn = document.getElementById('submitBtn');
      var ok = document.getElementById('successMsg');
      var err = document.getElementById('errorMsg');
      btn.disabled = true; btn.textContent = 'Sending…';
      ok.hidden = true; err.hidden = true;
      var fields = Object.fromEntries(new FormData(this).entries());
      fetch('/.netlify/functions/applications', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ type: 'other', fields: fields })
      })
        .then(function (res) {
          if (!res.ok) throw new Error('HTTP ' + res.status);
          ok.hidden = false; e.target.reset();
        })
        .catch(function (e2) {
          console.error('Contact submission error:', e2); err.hidden = false;
        })
        .finally(function () {
          btn.disabled = false; btn.textContent = 'Send';
        });
    });
  </script>
  <script src="/homepage-admin-state.js"></script>
</body>
</html>
