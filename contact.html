<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Contact Beslyfe</title><meta name="description" content="Contact the Beslyfe team for help with the platform or community."><link rel="canonical" href="https://beslyfe.com/contact"><link rel="icon" href="/assets/favicon.svg"><link rel="stylesheet" href="/assets/css/beslyfe.css"><style>.contact{max-width:880px;margin:0 auto;padding:90px 22px}.contact-card{display:grid;grid-template-columns:.8fr 1.2fr;gap:34px;padding:clamp(22px,5vw,48px);border:1px solid #ded5ec;border-radius:30px;background:#fff}.contact-card label{display:block;font-weight:800;margin:0 0 6px}.contact-card input,.contact-card textarea{width:100%;margin:0 0 16px;padding:13px;border:1px solid #cec5dc;border-radius:12px;font:inherit}.contact-card textarea{min-height:150px}.status{margin-top:12px;color:#14745a;font-weight:700}@media(max-width:700px){.contact-card{grid-template-columns:1fr}}</style></head><body><header class="site-header"><nav class="shell primary-nav"><a class="brand" href="/">beslyfe<span>.</span></a><div class="nav-links"><a href="/community">Community</a><a href="/create">Build</a><a href="/about">About</a></div></nav></header><main class="contact"><p class="eyebrow">Talk to a human</p><h1>How can we help?</h1><section class="contact-card"><div><h2>Community and platform support</h2><p>Tell us what you are trying to build or where you got stuck. Your message enters the same operator workflow as every other Beslyfe request.</p></div><form id="contactForm"><label for="contactName">Name</label><input id="contactName" name="name" autocomplete="name" required><label for="contactEmail">Email</label><input id="contactEmail" type="email" name="email" autocomplete="email" required><label for="contactMessage">Message</label><textarea id="contactMessage" name="message" required></textarea><button class="button" type="submit" id="submitBtn">Send message</button><p class="status" id="formStatus" role="status"></p></form></section></main><script>document.getElementById('contactForm').addEventListener('submit',async function(e){e.preventDefault();var b=document.getElementById('submitBtn'),s=document.getElementById('formStatus'),fields=Object.fromEntries(new FormData(this).entries()),ecosystemId=new URLSearchParams(location.search).get('ecosystem');if(ecosystemId)fields.ecosystemId=ecosystemId;b.disabled=true;s.textContent='Sending…';try{var r=await fetch('/.netlify/functions/applications',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'other',fields:fields})});if(!r.ok)throw new Error();s.textContent='Thanks — your message has been received.';this.reset()}catch(_){s.textContent='We could not send that yet. Please try again.'}finally{b.disabled=false}}</script><script src="/assets/js/traffic.js" defer></script></body></html>
